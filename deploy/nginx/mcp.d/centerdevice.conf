# CenterDevice MCP — port 9443
# Handles: MCP endpoint, OAuth discovery, OAuth flow, health check

location /mcp {
    proxy_pass http://127.0.0.1:9543;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
}

location /.well-known/ {
    proxy_pass http://127.0.0.1:9543;
    proxy_set_header Host $host;
}

location /oauth/ {
    proxy_pass http://127.0.0.1:9543;
    proxy_set_header Host $host;
}

# CD OAuth callback (CenterDevice redirects back here after login)
location /auth/callback {
    proxy_pass http://127.0.0.1:9543;
    proxy_set_header Host $host;
}

location = /health {
    proxy_pass http://127.0.0.1:9543;
}
