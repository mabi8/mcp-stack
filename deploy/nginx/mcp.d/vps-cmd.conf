# VPS Command MCP — port 9445
# Runs on sss.makkib.com (bastion host)
# Handles: MCP endpoint, OAuth discovery, OAuth flow, health check

location /vps/mcp {
    proxy_pass http://127.0.0.1:9445/mcp;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
}

location /vps/.well-known/ {
    proxy_pass http://127.0.0.1:9445/.well-known/;
    proxy_set_header Host $host;
}

location /vps/oauth/ {
    proxy_pass http://127.0.0.1:9445/oauth/;
    proxy_set_header Host $host;
}

location = /vps/health {
    proxy_pass http://127.0.0.1:9445/health;
}
