server {
    listen 443 ssl;
    server_name box.makkib.com;

    ssl_certificate     /home/ops/tls/fullchain.pem;
    ssl_certificate_key /home/ops/tls/privkey.pem;

    # Each service provides its own location block(s).
    # Drop a .conf in /etc/nginx/mcp.d/ and reload nginx.
    include /etc/nginx/mcp.d/*.conf;
}
